<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GreenLeaf HR Assistant</title>
<style>

  :root {
    --bg: #f6f7f5;
    --surface: #ffffff;
    --text: #1b201c;
    --muted: #68716a;
    --border: rgba(20, 40, 25, 0.10);
    --accent: #2e7d32;
    --accent-soft: rgba(46, 125, 50, 0.10);
    --user-bubble: linear-gradient(135deg, #2e7d32, #43a047);
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1210;
      --surface: #191d1a;
      --text: #e7eae7;
      --muted: #97a099;
      --border: rgba(255, 255, 255, 0.09);
      --accent: #66bb6a;
      --accent-soft: rgba(102, 187, 106, 0.12);
      --shadow: none;
    }
  }

  /* Base layout */
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  .shell {
    width: 100%;
    max-width: 780px;
    margin-inline: auto;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: 0 16px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--user-bubble);
    display: grid; place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .head-text { flex: 1; min-width: 0; }
  .head-text h1 { font-size: 15px; margin: 0; font-weight: 650; }
  .head-text p  { font-size: 12.5px; margin: 0; color: var(--muted); }
  #new-chat {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background .15s;
  }
  #new-chat:hover { background: var(--accent-soft); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
  }

  #welcome {
    margin: auto;
    text-align: center;
    padding: 24px 8px;
    animation: rise .4s ease both;
  }
  #welcome .big { font-size: 44px; }
  #welcome h2 { font-size: 22px; margin: 10px 0 4px; font-weight: 650; }
  #welcome p  { color: var(--muted); margin: 0 0 22px; font-size: 14.5px; }
  .chips {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    max-width: 560px;
    margin-inline: auto;
  }
  .chip {
    text-align: left;
    font-size: 13.5px;
    line-height: 1.35;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color .15s, transform .15s;
  }
  .chip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .chip .c-icon { display: block; font-size: 17px; margin-bottom: 4px; }
  @media (max-width: 520px) { .chips { grid-template-columns: 1fr; } }

  /* Message rows */
  .row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: rise .25s ease both;
  }
  .row.user { flex-direction: row-reverse; }
  .avatar {
    width: 30px; height: 30px;
    border-radius: 10px;
    flex-shrink: 0;
    display: grid; place-items: center;
    font-size: 15px;
  }
  .row.bot  .avatar { background: var(--accent-soft); }
  .row.user .avatar { background: var(--user-bubble); color: #fff; font-size: 12px; font-weight: 600; }
  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 16px;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    font-size: 14.5px;
  }
  .row.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow);
  }
  .row.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 6px;
  }
  .row.bot .bubble.escalated { border-left: 3px solid #e6a23c; }

  /* Source citation footer inside a bot bubble */
  .source {
    margin-top: 9px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 12.5px;
    color: var(--muted);
  }

  /* Typing indicator */
  .dots { display: inline-flex; gap: 5px; padding: 4px 2px; }
  .dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: .18s; }
  .dots span:nth-child(3) { animation-delay: .36s; }

  /* Composer */
  .composer-wrap { padding: 10px 0 14px; }
  .composer {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 8px 8px 16px;
    box-shadow: var(--shadow);
    transition: border-color .15s;
  }
  .composer:focus-within { border-color: var(--accent); }
  #input {
    flex: 1;
    border: 0;
    background: transparent;
    color: var(--text);
    font: inherit;
    resize: none;
    outline: none;
    max-height: 160px;
    padding: 4px 0;
  }
  #send {
    width: 36px; height: 36px;
    border: 0;
    border-radius: 12px;
    background: var(--user-bubble);
    color: #fff;
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: opacity .15s, transform .15s;
  }
  #send:hover:not(:disabled) { transform: scale(1.05); }
  #send:disabled { opacity: .4; cursor: default; }
  .hint {
    text-align: center;
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 8px;
  }

  @keyframes rise  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%, 60%, 100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">🌿</div>
    <div class="head-text">
      <h1>GreenLeaf HR Assistant</h1>
      <p>Tier-1 HR answers · always source-cited</p>
    </div>
    <button id="new-chat" title="Start a fresh conversation">+ New chat</button>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="big">🌿</div>
      <h2>Hi, how can I help you today?</h2>
      <p>Ask me about expenses, holidays, leave, or any handbook policy.</p>
      <div class="chips">
        <button class="chip"><span class="c-icon">🧾</span>Can I expense a 30 CHF client lunch scanned with ScanPro?</button>
        <button class="chip"><span class="c-icon">📅</span>Is May 1st a public holiday in Basel?</button>
        <button class="chip"><span class="c-icon">🕘</span>What are the core office hours?</button>
        <button class="chip"><span class="c-icon">🌴</span>What is the vacation entitlement?</button>
      </div>
    </div>
  </div>

  <div class="composer-wrap">
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message GreenLeaf HR…"></textarea>
      <button id="send" aria-label="Send">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </button>
    </div>
    <div class="hint">Answers come from the GreenLeaf handbook, holiday data, and expense policy.</div>
  </div>

</div>

<script>
  
  let sid = sessionStorage.getItem('sid');
  if (!sid) { sid = crypto.randomUUID(); sessionStorage.setItem('sid', sid); }

  const chat    = document.getElementById('chat');
  const welcome = document.getElementById('welcome');
  const input   = document.getElementById('input');
  const send    = document.getElementById('send');

  //Rendering
 
  function addRow(kind, text) {
    const row = document.createElement('div');
    row.className = 'row ' + kind;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = kind === 'bot' ? '🌿' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (text !== undefined) bubble.textContent = text;

    row.append(avatar, bubble);
    chat.appendChild(row);
    row.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return bubble;
  }

  // Split lines into a styled citation footer
  function renderBotReply(bubble, text, escalated) {
    bubble.textContent = '';
    const lines = text.split('\n');
    const isSource = (l) => /^\s*(📎|📅)/.test(l);

    const bodyText = lines.filter(l => !isSource(l)).join('\n').trim();
    const sourceText = lines.filter(isSource).join('\n').trim();

    bubble.textContent = bodyText || text;
    if (sourceText) {
      const src = document.createElement('div');
      src.className = 'source';
      src.textContent = sourceText;
      bubble.appendChild(src);
    }
    if (escalated) bubble.classList.add('escalated');
  }

  function showTyping() {
    const bubble = addRow('bot');
    const dots = document.createElement('div');
    dots.className = 'dots';
    dots.append(...[0, 1, 2].map(() => document.createElement('span')));
    bubble.appendChild(dots);
    return bubble;
  }

  // Sending 
  let busy = false;

  async function sendMessage(message) {
    if (busy || !message) return;
    busy = true;
    send.disabled = true;
    welcome?.remove();

    addRow('user', message);
    const pending = showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, sessionId: sid })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      renderBotReply(pending, data.text ?? 'Something went wrong.', data.escalated);
    } catch {
      renderBotReply(pending, 'Connection error — please try again.', true);
    } finally {
      busy = false;
      send.disabled = false;
      input.focus();
      pending.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  }

  function submitFromInput() {
    const message = input.value.trim();
    input.value = '';
    autosize();
    sendMessage(message);
  }

  // Composer behaviour
  function autosize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  }
  input.addEventListener('input', autosize);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitFromInput(); }
  });
  send.addEventListener('click', submitFromInput);

  // Suggestion chips send their own text
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () =>
      sendMessage(chip.textContent.replace(/^\s*\S+\s*/, '').trim() || chip.textContent.trim()));
  });

  // New chat
  document.getElementById('new-chat').addEventListener('click', () => {
    sessionStorage.setItem('sid', crypto.randomUUID());
    location.reload();
  });

  input.focus();
</script>
</body>
</html>
